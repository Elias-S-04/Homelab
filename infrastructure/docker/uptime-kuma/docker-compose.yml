services:
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped

    networks:
      - proxy

    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.uptime.rule=Host(`status.home.arpa`)"

      - "traefik.http.routers.uptime.entrypoints=web"

      - "traefik.http.services.uptime.loadbalancer.server.port=3001"

    volumes:
      - /srv/storage/docker/volumes/uptime-kuma:/app/data

networks:
  proxy:
    external: true
